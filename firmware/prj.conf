# ============================================================
#  디스크리트 포텐쇼스탯 (nRF52832 SAADC 직접측정)
#  BLE NUS 스트리밍 + RTT 로그 + NVM 설정 저장
# ============================================================

# ---- Bluetooth (BLE NUS) : AD5941 버전과 동일 구조 ----
CONFIG_BT=y
CONFIG_BT_PERIPHERAL=y
CONFIG_BT_DEVICE_NAME="pstat"
CONFIG_BT_NUS=y

# MTU / throughput (샘플 배치 한 줄이 기본 MTU 20B 를 넘으므로 크게)
CONFIG_BT_L2CAP_TX_MTU=247
CONFIG_BT_BUF_ACL_TX_SIZE=251
CONFIG_BT_BUF_ACL_RX_SIZE=251
CONFIG_BT_CTLR_DATA_LENGTH_MAX=251
CONFIG_BT_GATT_CLIENT=y

# HFXO 시동 대기시간 여유 (AD5941 보드 이력 계승 — 안전값)
CONFIG_MPSL_HFCLK_LATENCY=5000

# ---- Peripherals ----
CONFIG_GPIO=y
CONFIG_ADC=y
# SPI 없음 (AD5941 제거) — 명시적으로 끔
CONFIG_SPI=n
CONFIG_SERIAL=n

# ---- 부동소수점 (전류 환산/캘리브레이션) ----
CONFIG_FPU=y
CONFIG_CBPRINTF_FP_SUPPORT=y

# ---- LFCLK: 32.768kHz 크리스탈 미실장 → 내부 RC (+BLE 용 자동 캘리브레이션) ----
CONFIG_CLOCK_CONTROL_NRF_K32SRC_RC=y

# ---- 설정/캘리브레이션 NVM 저장 (rf_ohm / oversample / cal) ----
CONFIG_FLASH=y
CONFIG_FLASH_MAP=y
CONFIG_NVS=y
CONFIG_SETTINGS=y
CONFIG_SETTINGS_NVS=y

# ---- System OFF (배터리 컷오프) ----
CONFIG_POWEROFF=y

# ---- Logging: SEGGER RTT, non-blocking(overwrite) ----
CONFIG_LOG=y
CONFIG_USE_SEGGER_RTT=y
CONFIG_LOG_BACKEND_RTT=y
CONFIG_LOG_BACKEND_RTT_MODE_OVERWRITE=y
CONFIG_SEGGER_RTT_BUFFER_SIZE_UP=2048
CONFIG_LOG_MODE_DEFERRED=y

# ---- Stacks ----
CONFIG_MAIN_STACK_SIZE=4096
CONFIG_HEAP_MEM_POOL_SIZE=2048
